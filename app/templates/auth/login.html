{% extends "layout.html" %}

{% block body %}
<h2>Login</h2>
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <p>Email: <input type="email" name="email" required></p>
    <p>Password: <input type="password" name="password" required></p>
    <p><input type="submit" value="Login"></p>
</form>
{% endblock %}
